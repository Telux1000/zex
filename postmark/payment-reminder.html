<!DOCTYPE html>
<html>
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <title>Payment reminder</title>
  </head>
  <body style="font-family: system-ui, sans-serif; line-height: 1.5; color: #0f172a;">
    <p>Hi {{customerName}},</p>
    <p>
      This is a friendly reminder from <strong>{{companyName}}</strong> regarding invoice
      <strong>{{invoiceNumber}}</strong>, due <strong>{{dueDate}}</strong>.
    </p>
    <p>
      Amount due: <strong>{{amountDue}} {{currency}}</strong>
    </p>
    {{#if hasPaymentUrl}}
    <p>
      <a
        href="{{paymentUrl}}"
        style="display: inline-block; padding: 10px 16px; border-radius: 8px; background: #3b5cd1; color: #ffffff; text-decoration: none; font-weight: 600;"
        >{{paymentLinkText}}</a
      >
    </p>
    {{/if}}
    <p style="font-size: 12px; color: #64748b;">Thank you.</p>
  </body>
</html>
